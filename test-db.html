<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Test Database - Tabungan Santri</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .status { padding: 15px; margin: 10px 0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
    <h1>🔍 Test Koneksi Database</h1>
    <div id="result"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'
        
        const supabaseUrl = 'https://urhtraluxfdbpakpoqai.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyaHRyYWx1eGZkYnBha3BvcWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDcyNTAsImV4cCI6MjA5MTA4MzI1MH0.bfysO88WKo-Lze55NGIy8JdBFIqRswht_rAxr2HBaO4'
        
        const supabase = createClient(supabaseUrl, supabaseKey)
        
        async function checkDatabase() {
            const result = document.getElementById('result')
            
            // Check users table
            const { data: users, error: errUsers } = await supabase.from('users').select('*')
            if (errUsers) {
                result.innerHTML = `<div class="status error">❌ Error: ${errUsers.message}</div>`
                return
            }
            
            let html = `<div class="status success">✅ Terhubung ke Supabase!</div>`
            html += `<div class="status info">📊 users: ${users?.length || 0} record</div>`
            
            if (users && users.length > 0) {
                html += `<h3>User Terdaftar:</h3><table><tr><th>ID</th><th>Username</th><th>Name</th><th>Role</th><th>Approved</th></tr>`
                users.forEach(u => {
                    html += `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.name}</td><td>${u.role}</td><td>${u.approved ? '✅' : '❌'}</td></tr>`
                })
                html += `</table>`
            }
            
            // Check students
            const { count: studentsCount } = await supabase.from('students').select('*', { count: 'exact', head: true })
            html += `<div class="status info">📚 students: ${studentsCount || 0} record</div>`
            
            // Check transactions
            const { count: transCount } = await supabase.from('transactions').select('*', { count: 'exact', head: true })
            html += `<div class="status info">💰 transactions: ${transCount || 0} record</div>`
            
            html += `<br><h3>Login Info:</h3>`
            html += `<p><strong>Admin:</strong> admin / admin123</p>`
            html += `<p><strong>Staff:</strong> staff / staff123</p>`
            
            result.innerHTML = html
        }
        
        checkDatabase()
    </script>
</body>
</html>
